<body>
  <div class="soak-container">
    <div class="header">
      <span class="title">待泡脚</span>
    </div>
    
    <!-- 泡脚按钮 -->
    <div class="soak-btn-container">
      <button id="soakBtn" class="soak-btn">开始泡脚</button>
    </div>
    
    <!-- 倒计时进度条 -->
    <div class="countdown-bar">
      <span class="progress-wrapper">
        <span class="text">剩余时间：</span>
        <span class="progress-bracket">[</span>
        <span class="progress-filled" id="progressFilled"></span>
        <span class="progress-empty" id="progressEmpty"></span>
        <span class="progress-bracket-right">]</span>
      </span>
      <span class="progress-time" id="countdownTime">10s</span>
    </div>
  </div>
</body>

<style>
  .soak-container {
    width: 120px;
    height: 80px;
