<body>
    <div class="main-container">
        <!-- 倒计时显示 -->
        <div class="countdown-container" id="countdownContainer">
            <span class="countdown-number" id="countdownNumber">10</span>
            <span class="countdown-unit">秒</span>
        </div>
        
        <div class="header">
            <div class="title">脚部交互区域</div>
            <div class="close-btn" id="closeBtn">✕</div>
        </div>
        
        <div class="content-wrapper">
            <!-- 脚部图片 -->
            <div class="image-wrapper">
                <img class="foot-image" src="foot.png" />
            </div>
            
            <!-- 需求清单 -->
            <div class="demand-list" id="demandList">
                <div class="demand-title">需求清单</div>
                <span id="demandJiaobei">脚背: 0次</span>
                <span id="demandJiaozhang">脚掌: 0次</span>
                <span id="demandJiaogen">脚后跟: 0次</span>
                <span id="demandJiaozhi">脚趾: 0次</span>
                <span id="demandJiaoxin">脚心: 0次</span>
            </div>
        </div>
        
    </div>
</body>
<style>
    body {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: rgba(0, 0, 0, 0.7);
    }
    
    .main-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 15px;
        background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 40px rgba(102, 126, 234, 0.15);
    }
    
    .header {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        width: 24%;
        margin-bottom: 12px;
        gap: 10px;
    }
    
    .title {
        color: #ffffff;
        font-size: 16px;
        font-family: lxgw;
        font-weight: bold;
        letter-spacing: 1px;
    }
    
    .close-btn {
        width: 24px;
        height: 24px;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #ffffff;
        font-size: 14px;
        background-color: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        cursor: pointer;
        transition: all 0.2s;
    }
    
    .close-btn:hover {
        background-color: #e74c3c;
        transform: rotate(90deg);
    }
    
    .content-wrapper {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 20px;
    }
    
    .image-wrapper {
        width: 150px;
        height: 210px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    
    .foot-image {
        width: 180px;
        height:180px;
        border-radius: 8px;
        object-fit: contain;
        transform: rotate(50deg);
    }
    
    /* 需求清单样式 - 纯文本 */
    .demand-list {
        color: #ffffff;
        font-family: lxgw;
        font-size: 28px;
        line-height: 2;
        padding: 12px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 8px;
        min-width: 120px;
    }
    
    .demand-title {
        font-weight: bold;
        font-size: 20px;
        margin-bottom: 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        padding-bottom: 6px;
    }
    
    /* 倒计时样式 */
    .countdown-container {
        display: flex;
        flex-direction: row;
        align-items: baseline;
        justify-content: center;
        margin-bottom: 8px;
        padding: 8px 16px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    
    .countdown-number {
        font-size: 48px;
        font-weight: bold;
        color: #ffffff;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        font-family: Arial, sans-serif;
        line-height: 1;
    }
    
    .countdown-unit {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.9);
        margin-left: 4px;
        font-family: lxgw;
    }
    
    /* 倒计时紧迫状态 */
    .countdown-urgent {
        background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
        animation: pulse 1s infinite;
    }
    
    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
    }
</style>
<script>
    let closeBtn = document.getElementById("closeBtn");
    closeBtn.addEventListener("mousedown", function(e) {
        ApricityUI.closeScreen();
    });
    
    // 倒计时显示（由KubeJS客户端脚本通过Document API更新）
    // 初始显示10秒
    let countdownNumber = document.getElementById("countdownNumber");
    let countdownContainer = document.getElementById("countdownContainer");
</script>
