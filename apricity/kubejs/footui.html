<body>
  <div class="foot-ui-container">
    <div class="header">
      <span class="title">需求清单</span>
    </div>
    <div class="requireList">
      <div class="left">
        <div class="instep">
          <span class="label">脚背：</span>
          <span class="count" id="countJiaobei">3次</span>
        </div>
        <div class="footsole">
          <span class="label">脚掌：</span>
          <span class="count" id="countJiaozhang">2次</span>
        </div>
        <div class="heel">
          <span class="label">脚跟：</span>
          <span class="count" id="countJiaogen">1次</span>
        </div>
        <div class="footheart">
          <span class="label">脚心：</span>
          <span class="count" id="countJiaoxin">3次</span>
        </div>
        <div class="toe">
          <span class="label">脚趾：</span>
          <span class="count" id="countJiaozhi">2次</span>
        </div>
      </div>
    </div>
    <!-- 满意度和步骤 -->
    <div class="satisfaction">
      <span class="progress-wrapper">
        <span class="text">满意度：</span>
        <span class="progress-bracket">[</span>
        <span class="progress-filled" id="progressFilled"></span>
        <span class="progress-empty" id="progressEmpty"></span>
        <span class="progress-bracket-right">]</span>
      </span>
      <span class="progress-percent" id="satisfactionPercent">0%</span>
    </div>

    <!-- 步骤记录 -->
    <div class="steps-container" id="stepsContainer">
      <span class="steps-label">已执行:</span>
      <span class="steps-text" id="stepsText"></span>
    </div>

    <!-- 脚部位按钮 -->
    <div class="btn-container">
      <div id="jiaobei" class="jiaobei box">脚背</div>
      <div id="jiaozhang" class="jiaozhang box">脚掌</div>
      <div id="jiaogen" class="jiaogen box">脚跟</div>
      <div id="jiaoxin" class="jiaoxin box">脚心</div>
      <div id="jiaozhi" class="jiaozhi box">脚趾</div>
    </div>
  </div>
</body>
